name: Build Plug APK

# Runs automatically on every push to main/master, and can also be triggered
# manually from the Actions tab ("Run workflow" button).
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm install

      - name: Sync Capacitor web assets into the Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: plug-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
